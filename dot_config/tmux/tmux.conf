# Unbind the default prefix (Ctrl-b)
unbind C-b

# Set the prefix to Ctrl-a
set -g prefix C-a

# Rebind the "send-prefix" command to Ctrl-a
bind C-a send-prefix

set -g allow-rename off
set -g base-index 1
set -g mouse on
set -g renumber-windows on

set -s set-clipboard on

# tmux plugins
set -g @plugin "catppuccin/tmux"
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"

# Shortcuts
bind C-d popup -E -w 90% -h 90% -d "#{pane_current_path}" lazydocker
bind g popup -E -w 90% -h 90% -d "#{pane_current_path}" lazygit
# bind t popup -E -w 90% -h 90% -d "#{pane_current_path}"
bind t run-shell "sess=\$(tmux display-message -p '#{session_name}'); case \"\$sess\" in popup-*) tmux detach-client ;; *) wid=\$(tmux display-message -p '#{window_id}'); ppath=\$(tmux display-message -p '#{pane_current_path}'); tmux has-session -t \"popup-\$wid\" 2>/dev/null || tmux new-session -d -s \"popup-\$wid\" -c \"\$ppath\"; tmux set-option -t \"popup-\$wid\" status off; tmux display-popup -E -w 90% -h 90% -d \"\$ppath\" \"tmux attach -t popup-\$wid\" ;; esac"
bind T popup -E -w 90% -h 90%

# Hooks
# Clean up orphaned popup sessions when their parent window is closed
set-hook -g window-unlinked 'run-shell "tmux list-windows -a -F \"#{window_id}\" | rg -qx \"#{hook_window}\" || tmux kill-session -t popup-#{hook_window} 2>/dev/null"'

# catppuccin plugin settings
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"

run "~/.config/tmux/plugins/tpm/tpm"
